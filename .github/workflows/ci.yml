name: CI
on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - 'PSScriptAnalyzerSettings.psd1'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - 'PSScriptAnalyzerSettings.psd1'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (2026-06-02)
      - name: Show tool versions
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion
          Get-Module -ListAvailable Pester, PSScriptAnalyzer | Select-Object Name, Version
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $findings = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $findings | Format-Table -AutoSize | Out-String | Write-Output
          if ($findings) { throw "PSScriptAnalyzer found $($findings.Count) issue(s)" }
      - name: Pester
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg
